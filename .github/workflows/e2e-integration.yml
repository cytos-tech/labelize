name: E2E Integration

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Release]
    types: [completed]
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: E2E Integration
    runs-on: macos-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: e2e/sdk

      # ── Install labelize via Homebrew ─────────────────────────────
      - name: Install labelize via Homebrew
        run: |
          brew tap GOODBOY008/homebrew-labelize
          brew install labelize

      - name: Verify installation
        run: labelize --version

      # ── CLI E2E ───────────────────────────────────────────────────
      - name: Run CLI E2E tests
        run: |
          chmod +x e2e/cli/test_cli.sh
          bash e2e/cli/test_cli.sh

      # ── HTTP E2E ──────────────────────────────────────────────────
      - name: Run HTTP E2E tests
        run: |
          chmod +x e2e/http/test_http.sh
          bash e2e/http/test_http.sh

      # ── SDK E2E ───────────────────────────────────────────────────
      - name: Build SDK E2E project
        working-directory: e2e/sdk
        run: cargo build

      - name: Run SDK integration tests
        working-directory: e2e/sdk
        run: cargo test -- --nocapture

      # ── Upload convert outputs ────────────────────────────────────
      - name: Upload convert results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-convert-outputs
          retention-days: 1
          path: |
            e2e/cli-outputs/
            e2e/http-outputs/
            e2e/sdk/output/
